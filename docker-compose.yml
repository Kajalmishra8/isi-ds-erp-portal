# docker-compose.yml
version: '3.9'
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: erp_db
      POSTGRES_USER: erp_user
      POSTGRES_PASSWORD: secret
    ports: ['5432:5432']
    volumes: ['pgdata:/var/lib/postgresql/data']
    healthcheck:
      test: ['CMD-SHELL','pg_isready -U erp_user']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    env_file: ./backend/.env
    ports: ['8000:8000']
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    env_file: ./frontend/.env
    ports: ['8501:8501']
    depends_on: [backend]

volumes:
  pgdata: